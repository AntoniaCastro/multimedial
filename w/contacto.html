<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>

    <style>
        /* Estilo general del cuerpo */
        body {
            background-color: brown; 
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Bloque central de contacto */
        .bloque-contacto {
            background-color: white;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px; /* Tamaño similar al index */
            transition: transform 0.3s ease;
        }

        .bloque-contacto:hover {
            transform: scale(1.02);
        }

        /* Imagen de contacto circular */
        .bloque-contacto img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%; /* Hace la imagen circular */
            margin-bottom: 20px;
            border: 5px solid #f0f0f0;
        }

        .link-interactivo {
            text-decoration: none;
            color: inherit;
            display: block;
            margin: 10px 0;
            transition: 0.3s;
        }

        .link-interactivo:hover {
            color: brown;
            transform: scale(1.1);
        }

        h2 { margin: 0 0 15px 0; color: #333; }
        h3 { margin: 5px 0; font-size: 18px; }
        h4 { margin: 5px 0; font-weight: normal; color: #666; }

        /* Botón Volver */
        .boton {
            background-color: rgb(104, 8, 24);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
            margin-top: 30px;
            border-radius: 5px;
            display: inline-block;
        }

        .boton:hover {
            background-color: rgb(170, 85, 85);
        }
    </style>
</head>

<body>

    <div class="bloque-contacto">
        <img src="img/mmmgatete.jpg" alt="Imagen de contacto">
        <h2>Contacto</h2>

        <a href="mailto:acastroc2@uft.edu" class="link-interactivo">
            <h3>acastroc2@uft.edu</h3>
        </a>

        <a href="https://www.instagram.com/missu_pyon?igsh=MXZ1ZjhkYzN0eGJzdQ==" target="_blank" class="link-interactivo">
            <h4>@missu_pyon</h4>
        </a>
    </div>

    <a href="index.html" class="boton">Volver al Inicio</a>

</body>
</html>
