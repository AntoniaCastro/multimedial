<!DOCTYPE html>
<html lang="es">
<head>

    <title>Contacto</title>

        body {
            background-color: #fff8E1; /* Mismo fondo que la anterior */

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contenedor {
            text-align: center;
            background: rgba(255, 255, 255, 0.85); /* Fondo blanco semi-transparente */

            width: 90%;
            position: relative; /* Asegura que esté sobre el pseudo-elemento ::before */

        h1 {
            font-size: 2rem;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }



        .volver {
            margin-top: 50px;
            text-decoration: none;
            color: #555;

            border-bottom: 1px solid #555;
