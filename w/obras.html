<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Obras</title>

    <style>
        /* Estilo general del cuerpo */
        body {
            font-family: Arial, sans-serif;
            background-color: #fff2cd;
            margin: 0;
        }

        /* Contenedor principal */
        .contenedor {
            width: 60%;
            margin: auto;
        }

        /* Sección o bloque */
        .bloque {
            background-color: white;
            margin: 20px 0;
            padding: 50px;
            border-radius: 10px;
        }

         /* Encabezado */
        .bloque h2 {
            margin-top: 20px;
        }

        /* Imagen */
        .bloque img {
            width: 100%;
            height: auto;
        }


        /* Texto */
        .bloque p {
            line-height: 1.5;
        }

        .boton { /* Define una clase llamada "boton" */
         background-color: rgb(104, 8, 24); /* Color de fondo del botón */
         color: white; /* Color del texto */
         padding: 15px; /* Espacio interno (arriba, abajo, izquierda, derecha) */
         width: 150px; /* Ancho fijo del botón */
         text-align: center; /* Centra el texto horizontalmente */
         transition: 0.3s; /* Hace que los cambios (como color) sean suaves en 0.3 segundos */
        }

        .boton:hover { /* Se activa cuando el mouse pasa sobre el elemento */
         background-color: rgb(170, 85, 85); /* Cambia el color de fondo al pasar el mouse */
        }

        
    </style>
</head>

<body>


    <!-- Contenedor principal -->
    <div class="contenedor">

        <!-- BLOQUE 1 -->
        <div class="bloque">
        <h1> Obras </h1>
           
        </div>

        <!-- BLOQUE 1 -->
        <div class="bloque">
            <h2>Alucinación de consuelo</h2>
            <img src="img/alucinaciondeconsuelo.jpg" alt="Alucinación de consuelo">
            <h4>2025</h4>
            <p>
                Impresiones sobre papel
            </p>
        </div>

        <!-- BLOQUE 2 -->
        <div class="bloque">
            <h2>Amalgama</h2>
            <img src="img/amalgama.jpg" alt="Amalgama">
            <h4>2025</h4>
            <p>
                Tecnica mixta
            </p>
        </div>

        <!-- BLOQUE 3 -->
        <div class="bloque">
            <h2>Sin titulo</h2>
            <img src="img/ornamentacionquiensabe.jpg" alt="ornamentacionquiensabe">
            <h4>2026</h4>
            <p>
                Impresiones sobre papel
            </p>
        </div>

        <!-- BLOQUE 4 -->
        <div class="bloque">
            <h2>Sin titulo</h2>
            <img src="img/encajes.jpg" alt="encajes">
            <h4>2025</h4>
            <p>
                Impresiones sobre papel
            </p>
        </div>

        <div class="boton">Pasa el mouse</div> <!-- Elemento que usa la clase "boton" -->

    </div>

<a href="index.html">Volver</a><br>

</body>
</html>
