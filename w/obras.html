<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obras - Antonia Castro</title>
    <style>
        body {
            background-color: #fff8E1; /* Mismo fondo que la anterior */
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 2rem;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* Contenedor de la composición de imágenes */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; /* Espacio entre imágenes */
            max-width: 1000px;
            width: 100%;
        }

        .obra-item {
            background-color: white;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            
        }



        .obra-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .volver {
            margin-top: 50px;
            text-decoration: none;
            color: #555;
            font-weight: bold;
            border-bottom: 1px solid #555;
            transition: 0.3s;
        }

        
    </style>
</head>
<body>

    <h2>Obras</h2>

    <div class="galeria">
        <div class="obra-item">
            <img src="img/telas.jpg" alt="Obra 1">
        </div>

        <div class="obra-item">
            <img src="img/alucinaciondeconsuelo1.jpg" alt="Obra 2">
        </div>

        <div class="obra-item">
            <img src="img/amalgama.jpg" alt="Obra 3">
        </div>
    </div>

    <a href="index.html" class="volver">← Volver al inicio</a>

</body>
</html>
